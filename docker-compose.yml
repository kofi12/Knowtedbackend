services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: knowted
      POSTGRES_USER: knowted
      POSTGRES_PASSWORD: knowted
    ports:
      - "5433:5432"
    volumes:
      - knowted_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowted -d knowted"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/knowted
      - SPRING_DATASOURCE_USERNAME=knowted
      - SPRING_DATASOURCE_PASSWORD=knowted
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    depends_on:
      - backend

volumes:
  knowted_db:
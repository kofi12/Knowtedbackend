spring.application.name=KnowtedBackend
baseUrl=http://localhost:8080
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
frontend.redirect-url=https://knowtedfrontend-oimw-oy68n10tr-aaron-haizels-projects.vercel.app
# Longer dummy secret (at least 32 characters = 256 bits)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
spring.cloud.gcp.credentials.location=${GCS_CREDENTIALS}
gcp.bucket.name=know-ted-bucket

# DataSource (from .env – use localhost for local dev, db for Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}